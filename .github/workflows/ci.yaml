name: TripStack Capstone CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-db-tests:
    name: API + DB Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: API-DB Capstone

    env:
      baseUrl: https://api.tripstack.doomple.com/
      apiUrl: https://api.tripstack.doomple.com/

      TRIPSTACK_EMAIL: ${{ secrets.TRIPSTACK_EMAIL }}
      TRIPSTACK_PASSWORD: ${{ secrets.TRIPSTACK_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Run Maven Tests
        run: mvn clean test

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: API-DB Capstone/allure-results

  ui-tests:
    name: Playwright UI Tests
    runs-on: ubuntu-latest
    needs: api-db-tests

    defaults:
      run:
        working-directory: Playwright

    env:
      baseUrl: https://api.tripstack.doomple.com/

      TRIPSTACK_EMAIL: ${{ secrets.TRIPSTACK_EMAIL }}
      TRIPSTACK_PASSWORD: ${{ secrets.TRIPSTACK_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Playwright/playwright-report